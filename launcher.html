/* ════════════════════════════════════════════════

:root {
  --bg: #0c0b09; --bg2: #131210; --bg3: #1a1915;
  --surface: rgba(255,251,240,0.04); --surface2: rgba(255,251,240,0.07); --surface3: rgba(255,251,240,0.10);
  --border: rgba(255,251,240,0.09); --border2: rgba(255,251,240,0.15);
  --text: #f5f0e8; --text2: #b8b0a0; --text3: #7a7468;
  --accent: #d4a853; --accent2: #c9956a; --accent-soft: rgba(212,168,83,0.12);
  --red: #c0574a; --green: #5c8c6e; --blue: #4a7a9b;
  --glass-bg: rgba(18,17,14,0.75); --glass-border: rgba(255,251,240,0.08);
  --shadow: 0 8px 32px rgba(0,0,0,0.4); --shadow-sm: 0 2px 12px rgba(0,0,0,0.3);
  --r: 16px; --r-sm: 10px;
}

[data-theme="light"] {
  --bg: #F0EEE6; --bg2: #E8E6DC; --bg3: #DDD9CE;
  --surface: rgba(60,50,35,0.05); --surface2: rgba(60,50,35,0.08); --surface3: rgba(60,50,35,0.12);
  --border: rgba(60,50,35,0.10); --border2: rgba(60,50,35,0.18);
  --text: #1a1714; --text2: #5a5248; --text3: #9a9088;
  --accent: #8b5e1a; --accent2: #a0633c; --accent-soft: rgba(139,94,26,0.10);
  --red: #9b3d32; --green: #3d6b50; --blue: #2d5c7a;
  --glass-bg: rgba(240,238,230,0.80); --glass-border: rgba(60,50,35,0.12);
  --shadow: 0 8px 32px rgba(0,0,0,0.10); --shadow-sm: 0 2px 12px rgba(0,0,0,0.07);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent }
html { scroll-behavior: smooth }

body {
  background: var(--bg); color: var(--text);
  font-family: 'Anthropic Serif', Georgia, 'Times New Roman', serif;
  min-height: 100vh; overflow-x: hidden;
  transition: background 0.4s, color 0.4s; cursor: default;
}

/* ═══ STEVE JOBS ANIMATED BACKGROUND ═══ */
body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 800px 600px at 20% 20%, rgba(212,168,83,0.06), transparent),
    radial-gradient(ellipse 600px 500px at 80% 80%, rgba(201,149,106,0.05), transparent),
    radial-gradient(ellipse 400px 300px at 50% 50%, rgba(212,168,83,0.03), transparent);
  pointer-events: none; z-index: 0;
  animation: bgPulse 12s ease-in-out infinite;
}
@keyframes bgPulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.7; transform: scale(1.05); }
}

/* Floating particles — Steve Jobs "think different" ethereal feel */
.particles { position: fixed; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }
.particle {
  position: absolute; width: 3px; height: 3px;
  background: var(--accent); border-radius: 50%; opacity: 0;
  animation: floatParticle 15s linear infinite;
}
@keyframes floatParticle {
  0% { transform: translateY(100vh) scale(0); opacity: 0; }
  10% { opacity: 0.4; } 90% { opacity: 0.4; }
  100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
}

/* NOISE GRAIN */
body::after {
  content: ''; position: fixed; inset: 0; opacity: 0.015;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 999;
}

/* ═══ CLICK FEEDBACK ═══ */
.click-ripple {
  position: fixed; border-radius: 50%; background: var(--accent);
  opacity: 0.3; pointer-events: none; transform: scale(0);
  animation: rippleEffect 0.5s ease-out forwards; z-index: 10000;
}
@keyframes rippleEffect { to { transform: scale(4); opacity: 0; } }

button, .tab, .icon-btn, .chip, .cal-cell, .event-row, .music-result-row, .gift-card, .feature-card, .music-btn, .exam-chip {
  transition: transform 0.1s ease, box-shadow 0.2s ease;
}
button:active, .tab:active, .icon-btn:active, .chip:active, .cal-cell:active, .event-row:active, .music-result-row:active, .gift-card:active, .feature-card:active, .music-btn:active, .exam-chip:active {
  transform: scale(0.97);
}

/* ═══ COMPONENTS ═══ */

}
.glass-sm {

.burger-btn {

}

}
.mobile-nav-overlay a:hover { color: var(--accent); }
.mobile-nav-overlay a.active { color: var(--accent); }

/* Show burger on mobile, hide desktop tabs */
@media (max-width: 640px) {
  .nav-tabs { display: none !important; }
  .burger-btn { display: flex !important; }

}

.nav {

  padding: 0 24px; height: 60px;

  -webkit-backdrop-filter: blur(32px) saturate(1.6);

}
.nav-logo {

  font-weight: 700; color: var(--text); letter-spacing: 0.02em;

}
.nav-logo-mark {

  font-family: 'Anthropic Serif', Georgia, serif;
}
.nav-tabs { display: flex; gap: 2px; background: var(--surface); border: 1px solid var(--border); border-radius: 40px; padding: 4px; }
.tab {
  padding: 5px 14px; border-radius: 30px; border: none; background: none;
  color: var(--text3); font-family: 'Anthropic Serif', Georgia, serif;
  font-size: 0.72rem; font-weight: 500; cursor: pointer;
  transition: all 0.2s ease; letter-spacing: 0.02em; white-space: nowrap;
}
.tab:hover { color: var(--text2) }
.tab.active { background: var(--accent); color: #fff; font-weight: 600; }
.nav-right { display: flex; align-items: center; gap: 8px; }
.icon-btn {
  width: 34px; height: 34px; border-radius: 50%; background: var(--surface);
  border: 1px solid var(--border); color: var(--text2); font-size: 0.85rem;
  cursor: pointer; display: grid; place-items: center; transition: all 0.2s;
}
.icon-btn:hover { background: var(--surface2); border-color: var(--accent); color: var(--accent); }

/* ═══ PAGES ═══ */
.page { display: none; padding: 80px 24px 40px; max-width: 920px; margin: 0 auto; animation: fadeUp 0.35s ease }
.page.active { display: block }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px) } to { opacity: 1; transform: none } }

/* ═══ CARDS ═══ */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 20px; position: relative; overflow: hidden;
  transition: border-color 0.2s;
}
.card:hover { border-color: var(--border2) }
.card-premium { background: linear-gradient(135deg, rgba(212,168,83,0.08) 0%, var(--surface) 60%); border-color: rgba(212,168,83,0.2); }
.card-inner { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 14px; }

.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px }
.grid4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px }
@media (max-width: 640px) { .grid2, .grid3, .grid4 { grid-template-columns: 1fr } .nav-tabs { display: none } }

/* ═══ TYPOGRAPHY ═══ */
.display, .mono { font-family: 'Anthropic Serif', Georgia, serif; }
.mono { font-variant-numeric: tabular-nums; }
.sec-label {
  font-size: 0.65rem; font-weight: 600; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--text3); margin-bottom: 10px;
  font-family: 'Anthropic Serif', Georgia, serif;
}
.heading { font-family: 'Anthropic Serif', Georgia, serif; font-size: 1.5rem; font-weight: 700; color: var(--text); line-height: 1.2; }

.stat-cell { text-align: center; padding: 12px 8px }

.stat-label { font-size: 0.62rem; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 4px; font-family: 'Anthropic Serif', Georgia, serif; }

/* ═══ BUTTONS ═══ */
.btn {
  padding: 9px 20px; border-radius: 30px; border: none;
  font-family: 'Anthropic Serif', Georgia, serif; font-weight: 500;
  font-size: 0.82rem; cursor: pointer; transition: all 0.2s;
  letter-spacing: 0.01em; display: inline-flex; align-items: center; gap: 6px;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { opacity: 0.88; transform: translateY(-1px) }
.btn-ghost { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); }
.btn-ghost:hover { border-color: var(--accent); color: var(--accent) }
.btn-danger { background: rgba(192,87,74,0.15); border: 1px solid rgba(192,87,74,0.25); color: var(--red); }
.btn-sm { padding: 6px 14px; font-size: 0.75rem }
.btn-xs { padding: 4px 10px; font-size: 0.7rem }
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center }

/* ═══ PROGRESS BARS ═══ */
.progress-track { height: 5px; background: var(--surface3); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }

/* ═══ STREAK ═══ */
.streak-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 16px; position: relative; }
.streak-ring { width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--border2); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; background: radial-gradient(circle, var(--accent-soft), transparent); }
.streak-num { font-family: 'Anthropic Serif', Georgia, serif; font-size: 2.4rem; font-weight: 900; color: var(--accent); line-height: 1; }
.streak-label { font-size: 0.6rem; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; font-family: 'Anthropic Serif', Georgia, serif; }

/* ═══ TIMER ═══ */
.timer-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 8px 0; }
.timer-circle-wrap { position: relative; width: 220px; height: 220px; }
.timer-circle-wrap svg { transform: rotate(-90deg) }
.timer-circle-bg { fill: none; stroke: var(--surface3); stroke-width: 6 }
.timer-circle-fg { fill: none; stroke: var(--accent); stroke-width: 6; stroke-linecap: round; stroke-dasharray: 628; stroke-dashoffset: 628; transition: stroke-dashoffset 0.8s linear; filter: drop-shadow(0 0 8px rgba(212,168,83,0.5)); }
.timer-inner { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
.timer-time { font-family: 'Anthropic Serif', Georgia, serif; font-variant-numeric: tabular-nums; font-size: 3rem; font-weight: 400; color: var(--text); letter-spacing: -0.02em; }
.timer-mode-label { font-size: 0.65rem; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; font-family: 'Anthropic Serif', Georgia, serif; }

/* ═══ CHIPS ═══ */
.chip-group { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center }
.chip {
  padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text3); font-size: 0.72rem;
  font-weight: 500; cursor: pointer; transition: all 0.2s;
  font-family: 'Anthropic Serif', Georgia, serif;
}
.chip:hover { border-color: var(--border2); color: var(--text2) }
.chip.active { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }

/* ═══ CALENDAR ═══ */
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px }
.cal-head-cell { text-align: center; font-size: 0.62rem; color: var(--text3); letter-spacing: 0.08em; padding: 6px 0; text-transform: uppercase; font-family: 'Anthropic Serif', Georgia, serif; }
.cal-cell { aspect-ratio: 1; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 500; cursor: pointer; border: 1px solid transparent; transition: all 0.15s; position: relative; color: var(--text2); }
.cal-cell:hover { border-color: var(--border2) }
.cal-cell.today { border-color: var(--accent); color: var(--accent); font-weight: 700 }
.cal-cell.studied { background: rgba(92,140,110,0.18); color: var(--green) }
.cal-cell.missed { background: rgba(192,87,74,0.12); color: var(--red) }
.cal-cell.empty { opacity: 0; pointer-events: none }
.cal-cell-dot { position: absolute; bottom: 4px; width: 4px; height: 4px; border-radius: 50%; background: var(--accent); }

.event-row { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: var(--surface2); border-radius: var(--r-sm); margin-bottom: 8px; border: 1px solid var(--border); transition: all 0.2s; }
.event-row:hover { border-color: var(--border2) }
.event-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0 }
.event-info { flex: 1 }
.event-title { font-size: 0.85rem; font-weight: 500; color: var(--text) }
.event-note { font-size: 0.7rem; color: var(--text3); margin-top: 2px }
.event-date { font-family: 'Anthropic Serif', Georgia, serif; font-variant-numeric: tabular-nums; font-size: 0.68rem; color: var(--text3) }

/* ═══ SUBJECT ROWS ═══ */
.subject-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.subject-row:last-child { border: none }
.subject-name { font-size: 0.82rem; font-weight: 500; min-width: 80px; color: var(--text) }
.subject-bar-track { flex: 1; height: 5px; background: var(--surface3); border-radius: 3px; overflow: hidden }
.subject-bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s }
.subject-pct { font-family: 'Anthropic Serif', Georgia, serif; font-variant-numeric: tabular-nums; font-size: 0.72rem; color: var(--text3); min-width: 36px; text-align: right }

/* ═══ DIARY ═══ */
.diary-entry { border-left: 2px solid var(--accent); padding: 10px 14px; margin-bottom: 10px; background: var(--surface2); border-radius: 0 var(--r-sm) var(--r-sm) 0; }
.diary-ts { font-family: 'Anthropic Serif', Georgia, serif; font-variant-numeric: tabular-nums; font-size: 0.62rem; color: var(--text3) }
.diary-text { font-size: 0.85rem; color: var(--text2); margin-top: 5px; line-height: 1.5 }

/* ═══ GIFTS ═══ */
.gift-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px,1fr)); gap: 10px }
.gift-card { aspect-ratio: 1; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; border: 1px solid var(--border); background: var(--surface); font-size: 0.58rem; color: var(--text3); text-align: center; transition: all 0.2s; cursor: default; padding: 8px; }
.gift-card.unlocked { background: linear-gradient(135deg, rgba(212,168,83,0.1), var(--surface)); border-color: rgba(212,168,83,0.35); color: var(--accent); }
.gift-icon { font-size: 1.5rem; line-height: 1 }

/* ═══ AI PAGE ═══ */
.ai-tag { display: inline-flex; align-items: center; gap: 5px; background: var(--accent-soft); border: 1px solid rgba(212,168,83,0.25); border-radius: 20px; padding: 3px 10px; font-size: 0.65rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); font-family: 'Anthropic Serif', Georgia, serif; }
.ai-response-box { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 16px; font-size: 0.85rem; line-height: 1.65; color: var(--text2); min-height: 80px; white-space: pre-wrap; }

@keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: 0.3 } }

/* ═══ SETTINGS SECTION ═══ */
.settings-section { margin-bottom: 14px; }
.settings-section-title { font-size: 0.62rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); padding: 0 0 8px; font-family: 'Anthropic Serif', Georgia, serif; }

<body>
<div id="js-fallback" style="position:fixed;inset:0;background:#0c0b09;z-index:1000;display:flex;align-items:center;justify-content:center;color:#f5f0e8;font-family:sans-serif;">
  <div style="text-align:center;">
    <div style="font-size:2rem;margin-bottom:10px;">⏳</div>
    <div>Loading Kosmosic...</div>
    <noscript><div style="color:#c0574a;margin-top:10px;">JavaScript is required.</div></noscript>
  </div>
</div>

<!-- Floating particles for Steve Jobs ethereal aesthetic -->
<div class="particles" id="particles"></div>

<!-- ═══ VIEWS ═══ -->
<div id="view-auth" style="display:none"></div>
<div id="view-app" style="display:none"></div>

<!-- NOTIFICATION -->
<div class="notif" id="notif">
  <div class="notif-dot"></div>
  <span id="notif-text"></span>
</div>

<script>
/* ════════════════════════════════════════════════════════
   KOSMOSIC — Study OS
   Anthropic Serif. Steve Jobs Aesthetic.
   Supabase Backend. Zero LocalStorage.
   ════════════════════════════════════════════════════════ */

// ── SUPABASE CLIENT ──
// NOTE: Supabase CDN creates global 'supabase'. Don't use 'let' here or it conflicts.
var currentUser = null;
var authMode = 'login';

// ── APP STATE (in-memory only, synced to Supabase) ──
let S = {
  streak: 0, studiedDays: [], missedDays: [], totalMinutes: 0, todayMinutes: 0,
  events: [], diary: [], marks: [], exams: [],
  subjects: ['Mathematics', 'Science', 'English', 'History', 'Physics'],
  dailyGoal: 120, targetPct: 98, gifts: [], aiTargets: [],
  aiProvider: 'claude', settings: { music: false, toxic: true, darkMode: true },
  did: '', plan: '', calYear: new Date().getFullYear(), calMonth: new Date().getMonth(),
  timerSecs: 1500, timerMode: 'focus', sessions: [], distractionCount: 0,
  lastStudiedDate: null, musicQueue: [], currentTrackIdx: 0,
};

// ── INIT SUPABASE ──
function initSupabase() {
  // Wait up to 3 seconds for CDN to load, checking every 100ms
  if (typeof window.supabase === 'undefined') {
    console.warn('Supabase JS not loaded from CDN yet. Will retry...');
    return false;
  }
  try {
    // Use window.supabase from CDN — assign to outer variable, don't redeclare with let
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    console.log('✅ Supabase initialized');
    return true;
  } catch(e) {
    console.error('Supabase init failed:', e);
    return false;
  }
}

// ── HELPERS ──
const today = () => new Date().toISOString().split('T')[0];

function notify(msg, dur = 3500) {
  const n = document.getElementById('notif');
  document.getElementById('notif-text').textContent = msg;
  n.classList.add('show');
  setTimeout(() => n.classList.remove('show'), dur);
}

function openModal(id) { document.getElementById(id).classList.add('open') }
function closeModal(id) { document.getElementById(id).classList.remove('open') }

// ── CLICK RIPPLE FEEDBACK ──
document.addEventListener('click', function(e) {
  const ripple = document.createElement('div');
  ripple.className = 'click-ripple';
  ripple.style.left = e.clientX + 'px';
  ripple.style.top = e.clientY + 'px';
  ripple.style.width = '20px';
  ripple.style.height = '20px';
  ripple.style.marginLeft = '-10px';
  ripple.style.marginTop = '-10px';
  document.body.appendChild(ripple);
  setTimeout(() => ripple.remove(), 500);
});

// ── THEME ──
function setTheme(dark) {
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  S.settings.darkMode = dark;
  const btn = document.getElementById('theme-btn');
  if (btn) btn.textContent = dark ? '☀' : '☾';
}

// ── PARTICLES ──
function initParticles() {
  const container = document.getElementById('particles');
  if (!container) return;
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDelay = Math.random() * 15 + 's';
    p.style.animationDuration = (10 + Math.random() * 10) + 's';
    p.style.width = (2 + Math.random() * 2) + 'px';
    p.style.height = p.style.width;
    container.appendChild(p);
  }
}

// ════════════════════════════════════════════════════════
// SUPABASE DATA SYNC
// ════════════════════════════════════════════════════════

async function loadUserData() {
  if (!supabase || !currentUser) { console.log('Skipping load — no Supabase session.'); return; }
  try {
    const { data, error } = await supabase
      .from('user_data')
      .select('*')
      .eq('user_id', currentUser.id)
      .single();
    if (error && error.code !== 'PGRST116') { console.error('Load error:', error); return; }
    if (data) {
      S = { ...S, ...data.data };
      S.subjects = data.data.subjects || S.subjects;
      S.events = data.data.events || [];
      S.diary = data.data.diary || [];
      S.marks = data.data.marks || [];
      S.exams = data.data.exams || [];
      S.aiTargets = data.data.aiTargets || [];
      S.gifts = data.data.gifts || [];
      S.musicQueue = data.data.musicQueue || [];
      S.sessions = data.data.sessions || [];
      S.settings = data.data.settings || S.settings;
    }
    setTheme(S.settings.darkMode !== false);
  } catch (e) { console.error('Load failed:', e); }
}

async function saveUserData() {
  if (!supabase || !currentUser) { console.log('Skipping save — no Supabase session.'); return; }
  try {
    const { error } = await supabase
      .from('user_data')
      .upsert({ user_id: currentUser.id, data: S, updated_at: new Date().toISOString() }, { onConflict: 'user_id' });
    if (error) console.error('Save error:', error);
  } catch (e) { console.error('Save failed:', e); }
}

let saveTimeout;
function queueSave() {
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(saveUserData, 1000);
}

// ════════════════════════════════════════════════════════
// AUTH
// ════════════════════════════════════════════════════════
function renderAuth() {
  const isLogin = authMode === 'login';
  document.getElementById('view-auth').innerHTML = `
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="nav-logo" style="justify-content:center;margin-bottom:4px">
        <div class="nav-logo-mark">K</div>
        Kosmosic
      </div>
    </div>
    <div class="auth-title">${isLogin ? 'Welcome back' : 'Create account'}</div>
    <div class="auth-sub">${isLogin ? 'Sign in to your study OS' : 'Start your journey to 98%'}</div>
    <button class="auth-btn-google" onclick="signInWithGoogle()">
      <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
    <div class="auth-divider">or</div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" id="auth-email" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" id="auth-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')handleAuth()">
    </div>
    ${!isLogin ? `
    <div class="form-group">
      <label class="form-label">Full Name</label>
      <input type="text" id="auth-name" placeholder="Alex Chen">
    </div>` : ''}
    <div class="auth-error" id="auth-error"></div>
    <button class="btn-auth" onclick="handleAuth()">${isLogin ? 'Sign In' : 'Create Account'}</button>
    <div class="auth-switch">
      ${isLogin ? `Don't have an account? <a onclick="switchAuth('signup')">Sign up free</a>` : `Already have an account? <a onclick="switchAuth('login')">Sign in</a>`}
    </div>
  </div>
</div>`;
}

async function handleAuth() {
  if (!supabase) { notify('Supabase not initialized.'); return; }
  const email = document.getElementById('auth-email')?.value?.trim();
  const pass = document.getElementById('auth-pass')?.value;
  const errEl = document.getElementById('auth-error');
  if (!email || !pass) { errEl.textContent = 'Please fill in all fields.'; errEl.classList.add('show'); return; }
  errEl.classList.remove('show');
  if (authMode === 'signup') {
    const name = document.getElementById('auth-name')?.value?.trim() || email.split('@')[0];
    const { data, error } = await supabase.auth.signUp({ email, password: pass, options: { data: { full_name: name } } });
    if (error) { errEl.textContent = error.message; errEl.classList.add('show'); return; }
    currentUser = data.user;
    notify('Account created! Welcome to Kosmosic ✦');
  } else {
    const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });
    if (error) { errEl.textContent = error.message; errEl.classList.add('show'); return; }
    currentUser = data.user;
    notify('Welcome back ✦');
  }
  await loadUserData();
  showApp();
}

async function signInWithGoogle() {
  if (!supabase) { notify('Supabase not configured. Add your keys first.'); return; }
  const { error } = await supabase.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin } });
  if (error) notify(error.message);
}

function switchAuth(mode) { authMode = mode; renderAuth(); }

async function signOut() {
  try { if (supabase) await supabase.auth.signOut(); } catch(e) {}
  currentUser = null;

// ════════════════════════════════════════════════════════
// STREAK + DASH
// ════════════════════════════════════════════════════════
const today_str = () => new Date().toISOString().split('T')[0];

function checkStreak() {
  const t = today_str();
  if (S.lastStudiedDate === t) return;
  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);
  const yd = yesterday.toISOString().split('T')[0];

  if (S.lastStudiedDate === yd) {
    S.streak++;
  } else if (S.lastStudiedDate && S.lastStudiedDate !== t) {
    const start = new Date(S.lastStudiedDate);
    const end = new Date(t);
    let d = new Date(start);
    d.setDate(d.getDate() + 1);
    while (d < end) {
      const ds = d.toISOString().split('T')[0];
      if (!S.studiedDays.includes(ds) && !S.missedDays.includes(ds)) S.missedDays.push(ds);
      d.setDate(d.getDate() + 1);
    }
    S.streak = 1;
  } else {
    S.streak = 1;
  }

  S.lastStudiedDate = t;
  if (!S.studiedDays.includes(t)) S.studiedDays.push(t);
  queueSave();
  updateDash();
}

function updateDash() {
  const el = id => document.getElementById(id);
  if (!el('streak-display')) return;
  el('streak-display').textContent = S.streak;
  el('stat-studied').textContent = S.studiedDays.length;
  el('stat-missed').textContent = S.missedDays.length;
  el('stat-total').textContent = Math.floor(S.totalMinutes / 60) + 'h';
  el('stat-today').textContent = S.todayMinutes + 'm';
  const goal = parseInt(S.dailyGoal) || 120;
  const pct = Math.min(100, Math.round((S.todayMinutes / goal) * 100));
  el('goal-bar').style.width = pct + '%';
  el('goal-done').textContent = S.todayMinutes;
  el('goal-target').textContent = goal;
  el('goal-pct').textContent = pct + '%';
  if (el('did-today')) el('did-today').value = S.did || '';
  if (el('plan-tmr')) el('plan-tmr').value = S.plan || '';
  renderHeatmap();
  checkGifts();
}

function saveDay() {
  S.did = document.getElementById('did-today')?.value || '';
  S.plan = document.getElementById('plan-tmr')?.value || '';
  queueSave();
}

function renderHeatmap() {
  const wrap = document.getElementById('heatmap');
  if (!wrap) return;
  wrap.innerHTML = '';
  const t = new Date();
  for (let i = 13; i >= 0; i--) {
    const d = new Date(t);
    d.setDate(d.getDate() - i);
    const ds = d.toISOString().split('T')[0];
    const el = document.createElement('div');
    el.className = 'heat-cell';
    el.title = ds;
    if (S.studiedDays.includes(ds)) {
      el.classList.add('studied');
      el.textContent = '✓';
    } else if (S.missedDays.includes(ds)) {
      el.classList.add('missed');
      el.textContent = '✗';
    } else {
      el.textContent = d.getDate();
    }
    wrap.appendChild(el);
  }
}

// ════════════════════════════════════════════════════════
// TIMER
// ════════════════════════════════════════════════════════
let timerInterval = null;
let timerTotal = 1500;

function setMode(mode, mins) {
  ['focus','short','long','custom'].forEach(m => {
    document.getElementById('mode-' + m)?.classList.remove('active');
  });
  document.getElementById('mode-' + mode)?.classList.add('active');
  document.getElementById('custom-time-wrap').style.display = mode === 'custom' ? 'block' : 'none';
  if (mode !== 'custom') {
    S.timerMode = mode;
    S.timerSecs = mins * 60;
    timerTotal = mins * 60;
    resetTimerDisplay();
  }
}

function applyCustom() {
  const m = parseInt(document.getElementById('custom-mins').value) || 25;
  S.timerSecs = m * 60;
  timerTotal = m * 60;
  S.timerMode = 'custom';
  resetTimerDisplay();
}

function resetTimerDisplay() {
  clearInterval(timerInterval);
  timerInterval = null;
  const disp = document.getElementById('timer-display');
  if (disp) disp.textContent = formatTime(S.timerSecs);
  const circle = document.getElementById('timer-circle');
  if (circle) circle.style.strokeDashoffset = 628;
  const lbl = document.getElementById('timer-mode-label');
  if (lbl) lbl.textContent = S.timerMode.charAt(0).toUpperCase() + S.timerMode.slice(1);
}

function formatTime(s) {
  return `${String(Math.floor(s / 60)).padStart(2,'0')}:${String(s % 60).padStart(2,'0')}`;
}

function startTimer() {
  if (timerInterval) return;
  timerInterval = setInterval(() => {
    S.timerSecs--;
    if (S.timerSecs <= 0) {
      clearInterval(timerInterval);
      timerInterval = null;
      onTimerDone();
      return;
    }
    const disp = document.getElementById('timer-display');
    if (disp) disp.textContent = formatTime(S.timerSecs);
    const prog = 1 - (S.timerSecs / timerTotal);
    const circle = document.getElementById('timer-circle');
    if (circle) circle.style.strokeDashoffset = 628 * (1 - prog);
    if (S.timerSecs % 60 === 0 && S.timerMode === 'focus') {
      S.todayMinutes++;
      S.totalMinutes++;
      checkStreak();
      queueSave();
      updateDash();
    }
  }, 1000);
}

function pauseTimer() { clearInterval(timerInterval); timerInterval = null; }

function resetTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
  S.timerSecs = timerTotal;
  resetTimerDisplay();
}

function onTimerDone() {
  notify('Session complete! Outstanding work. ✦');
  const mins = Math.floor(timerTotal / 60);
  if (S.timerMode === 'focus') {
    S.todayMinutes += mins;
    S.totalMinutes += mins;
    S.sessions.push({ time: new Date().toLocaleTimeString(), mins, date: today_str() });
    checkStreak();
    queueSave();
    updateDash();
    renderSessionLog();
    checkGifts();
  }
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification('Kosmosic', { body: 'Study session complete. You earned it.' });
  }
}

function renderSessionLog() {
  const log = document.getElementById('session-log');
  if (!log) return;
  const todaySessions = S.sessions.filter(s => s.date === today_str());
  if (!todaySessions.length) {
    log.innerHTML = '<span style="color:var(--text3)">No sessions yet today.</span>';
    return;
  }
  log.innerHTML = todaySessions.map(s =>
    `<div style="padding:8px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
      <span style="font-family:'Anthropic Serif',Georgia,serif;font-variant-numeric:tabular-nums;font-size:0.72rem;color:var(--accent)">${s.time}</span>
      <span style="font-size:0.8rem;color:var(--text2)">${s.mins}m focus</span>
    </div>`
  ).join('');
}

// ════════════════════════════════════════════════════════
// WEBCAM
// ════════════════════════════════════════════════════════
let webcamActive = false, webcamStream = null;

async function toggleWebcam() {
  const btn = document.getElementById('webcam-toggle-btn');
  if (webcamActive) {
    webcamStream?.getTracks().forEach(t => t.stop());
    const wrap = document.getElementById('webcam-wrap');
    if (wrap) wrap.classList.remove('active');
    webcamActive = false;
    if (btn) btn.textContent = 'Enable';
    return;
  }
  try {
    webcamStream = await navigator.mediaDevices.getUserMedia({ video: true });
    const vid = document.getElementById('webcam');
    if (vid) vid.srcObject = webcamStream;
    const wrap = document.getElementById('webcam-wrap');
    if (wrap) wrap.classList.add('active');
    webcamActive = true;
    if (btn) btn.textContent = 'Disable';
    setInterval(() => {
      if (webcamActive && timerInterval) simulateDetection();
    }, 8000);
  } catch(e) {
    notify('Camera access denied.');
  }
}

function simulateDetection() {
  if (Math.random() < 0.08) {
    S.distractionCount = (S.distractionCount || 0) + 1;
    const dn = document.getElementById('distract-num');
    if (dn) dn.textContent = S.distractionCount;
    const ws = document.getElementById('webcam-status');
    if (ws) ws.textContent = '⚠ Focus! Eyes on screen!';
    notify('👁 Stay focused! Back to work.');
    setTimeout(() => {
      const ws2 = document.getElementById('webcam-status');
      if (ws2) ws2.textContent = 'Watching...';
    }, 3000);
  }
}

// CALENDAR
// ════════════════════════════════════════════════════════
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function renderCal() {
  const titleEl = document.getElementById('cal-title');
  if (!titleEl) return;
  titleEl.textContent = MONTHS[S.calMonth] + ' ' + S.calYear;
  const head = document.getElementById('cal-head');
  head.innerHTML = DAYS_SHORT.map(d => `<div class="cal-head-cell">${d}</div>`).join('');
  const first = new Date(S.calYear, S.calMonth, 1).getDay();
  const days = new Date(S.calYear, S.calMonth + 1, 0).getDate();
  const t = today_str();
  let html = '';
  for (let i = 0; i < first; i++) html += `<div class="cal-cell empty"></div>`;
  for (let d = 1; d <= days; d++) {
    const ds = `${S.calYear}-${String(S.calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = ds === t;
    const studied = S.studiedDays.includes(ds);
    const missed = S.missedDays.includes(ds);
    const hasEv = S.events.some(e => e.date === ds);
    html += `<div class="cal-cell${isToday?' today':''}${studied?' studied':''}${missed?' missed':''}" onclick="calDayClick('${ds}')">${d}${hasEv ? '<div class="cal-cell-dot"></div>' : ''}</div>`;
  }
  document.getElementById('cal-body').innerHTML = html;
  renderEvents();
}

function prevMonth() {
  S.calMonth--;
  if (S.calMonth < 0) { S.calMonth = 11; S.calYear--; }
  renderCal();
}

function nextMonth() {
  S.calMonth++;
  if (S.calMonth > 11) { S.calMonth = 0; S.calYear++; }
  renderCal();
}

function calDayClick(ds) {
  const ev = document.getElementById('ev-date');
  if (ev) ev.value = ds;
  openModal('event-modal');
}

function addEvent() {
  const ev = {
    title: document.getElementById('ev-title').value,
    date: document.getElementById('ev-date').value,
    type: document.getElementById('ev-type').value,
    note: document.getElementById('ev-note').value,
    id: Date.now()
  };
  if (!ev.title || !ev.date) { notify('Fill in title and date.'); return; }
  S.events.push(ev);
  queueSave();
  closeModal('event-modal');
  renderCal();
  notify('Event saved ✦');
  document.getElementById('ev-title').value = '';
  document.getElementById('ev-note').value = '';
}

function renderEvents() {
  const list = document.getElementById('events-list');
  if (!list) return;
  if (!S.events.length) {
    list.innerHTML = '<div style="color:var(--text3);font-size:0.8rem">No events yet.</div>';
    return;
  }
  const colors = { exam: 'var(--red)', study: 'var(--green)', deadline: 'var(--accent)', other: 'var(--blue)' };
  list.innerHTML = S.events
    .sort((a, b) => a.date.localeCompare(b.date))
    .map(e => `
      <div class="event-row">
        <div class="event-dot" style="background:${colors[e.type]||'var(--text3)'}"></div>
        <div class="event-info">
          <div class="event-title">${e.title}</div>
          ${e.note ? `<div class="event-note">${e.note}</div>` : ''}
        </div>
        <div class="event-date">${e.date}</div>
        <button class="btn btn-xs btn-danger" onclick="delEvent(${e.id})">✕</button>
      </div>`)
    .join('');
}

function delEvent(id) {
  S.events = S.events.filter(e => e.id !== id);
  queueSave();
  renderEvents();
  renderCal();
}

let selectedExam = 'all';

function renderExamSelector() {
  const container = document.getElementById('exam-selector');
  if (!container) return;

  const examNames = [...new Set(S.marks.map(m => m.exam).filter(Boolean))];

  });

  // Update modal dropdown

function selectExam(exam) {

}

function fillExamName() {

  const input = document.getElementById('mk-exam-name');
  if (select && input && select.value) {
    input.value = select.value;
  }
}

function updateExamSelect() {
  // This is called on input to potentially auto-suggest
}

function renderSubjectsMarks() {
  const list = document.getElementById('subjects-list');
  const sel = document.getElementById('mk-subject');
  if (sel) sel.innerHTML = S.subjects.map(s => `<option>${s}</option>`).join('');
  if (!list) return;

  let marksToShow = S.marks;
  if (selectedExam !== 'all') {
    marksToShow = S.marks.filter(m => m.exam === selectedExam);
  }

  if (!marksToShow.length) {
    list.innerHTML = '<div style="color:var(--text3);font-size:0.8rem;padding:8px 0">No marks entered yet.</div>';
    return;
  }

  const bySubject = {};
  S.subjects.forEach(s => { bySubject[s] = [] });
  marksToShow.forEach(m => { if (bySubject[m.subject]) bySubject[m.subject].push(m.pct) });
  const palette = ['#d4a853','#5c8c6e','#4a7a9b','#c9956a','#8b7355','#7a9b4a'];
  list.innerHTML = S.subjects.map((s, i) => {
    const avgs = bySubject[s];
    const avg = avgs.length ? Math.round(avgs.reduce((a,b) => a+b, 0) / avgs.length) : 0;
    return `<div class="subject-row">
      <div class="subject-name">${s}</div>
      <div class="subject-bar-track">
        <div class="subject-bar-fill" style="width:${avg}%;background:${palette[i % palette.length]}"></div>
      </div>
      <div class="subject-pct">${avg || '—'}%</div>
    </div>`;
  }).join('');
}

function renderExamComparison() {
  const container = document.getElementById('exam-comparison');
  if (!container) return;

  const examNames = [...new Set(S.marks.map(m => m.exam).filter(Boolean))];
  if (examNames.length < 2) {
    container.innerHTML = '<div style="color:var(--text3);font-size:0.8rem">Add marks for at least 2 different exams to see comparisons.</div>';
    return;
  }

  // Build comparison table
  let html = '<table class="exam-table"><thead><tr><th>Subject</th>';
  examNames.forEach(ex => {
    html += `<th>${ex}</th>`;
  });
  html += '<th>Avg</th><th>Best</th></tr></thead><tbody>';

  S.subjects.forEach(sub => {
    const subjectMarks = S.marks.filter(m => m.subject === sub);
    if (!subjectMarks.length) return;

    html += `<tr><td style="font-weight:500">${sub}</td>`;
    let total = 0, count = 0, best = 0;

    examNames.forEach(ex => {
      const mark = subjectMarks.find(m => m.exam === ex);
      if (mark) {
        html += `<td style="color:var(--accent);font-weight:600">${mark.pct}%</td>`;
        total += mark.pct;
        count++;
        if (mark.pct > best) best = mark.pct;
      } else {
        html += `<td style="color:var(--text3)">—</td>`;
      }
    });

    const avg = count ? Math.round(total / count) : 0;
    html += `<td style="color:var(--text2)">${avg}%</td>`;
    html += `<td style="color:var(--green);font-weight:600">${best}%</td>`;
    html += '</tr>';
  });

  html += '</tbody></table>';
  container.innerHTML = html;
}

function addMarks() {
  const examName = document.getElementById('mk-exam-name')?.value?.trim();
  const subject = document.getElementById('mk-subject')?.value;
  const marks = parseFloat(document.getElementById('mk-marks')?.value);
  const total = parseFloat(document.getElementById('mk-total')?.value);

  if (!examName) { notify('Enter an exam name.'); return; }
  if (!marks || !total) { notify('Enter marks and total.'); return; }

  const pct = Math.round((marks / total) * 100);
  const m = {
    subject, marks, total, exam: examName,
    pct, date: today_str(), id: Date.now()
  };

  // Add to exams list if new
  if (!S.exams.includes(examName)) {
    S.exams.push(examName);
  }

  S.marks.push(m);
  queueSave();
  closeModal('marks-modal');
  renderSubjectsMarks();
  renderExamSelector();
  renderExamComparison();
  renderCharts();
  notify(`Saved — ${pct}% in ${subject} (${examName}) ✦`);
  checkGifts();

  if (pct < 90) {
    const target = Math.min(100, pct + 10);
    S.aiTargets.push({ subject, current: pct, target, exam: examName });
    queueSave();
    notify(`AI Target: ${target}% next ${subject} test`);
  }

  document.getElementById('mk-marks').value = '';
  document.getElementById('mk-exam-name').value = '';
}

let barChartInst = null, spiderChartInst = null;

function renderCharts() {
  let marksToChart = S.marks;
  if (selectedExam !== 'all') {
    marksToChart = S.marks.filter(m => m.exam === selectedExam);
  }

  const bySubject = {};
  S.subjects.forEach(s => { bySubject[s] = [] });
  marksToChart.forEach(m => { if (bySubject[m.subject]) bySubject[m.subject].push(m.pct) });
  const avgs = S.subjects.map(s => {
    const a = bySubject[s];
    return a.length ? Math.round(a.reduce((x,y) => x+y, 0) / a.length) : 0;
  });
  const palette = ['#d4a853','#5c8c6e','#4a7a9b','#c9956a','#8b7355','#7a9b4a'];
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const gridColor = isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.06)';
  const tickColor = isDark ? '#7a7468' : '#9a9088';

  if (barChartInst) barChartInst.destroy();
  const bc = document.getElementById('barChart');
  if (bc) barChartInst = new Chart(bc, {
    type: 'bar',
    data: {
      labels: S.subjects,
      datasets: [{
        label: 'Average %',
        data: avgs,
        backgroundColor: palette.map(c => c + '55'),
        borderColor: palette,
        borderWidth: 2,
        borderRadius: 6
      }]
    },
    options: {
      responsive: true,

async function askAI() {
  const prompt = document.getElementById('ai-prompt')?.value?.trim();
  if (!prompt) { notify('Enter a prompt.'); return; }
  const resp = document.getElementById('ai-response');
  const loader = document.getElementById('ai-loader');
  if (resp) resp.textContent = '';
  if (loader) loader.style.display = 'flex';

  const marksData = S.marks.slice(-8).map(m => `${m.subject}: ${m.pct}% (${m.exam})`).join(', ');
  const toxicMode = S.settings?.toxic !== false;

  const systemPrompt = `You are an elite AI study coach named Kosmos for a high school student aiming for ${S.targetPct || 98}%+ and a career at top tech companies or as a pilot/founder.

Student data:
- Current streak: ${S.streak} days
- Total study time: ${Math.floor(S.totalMinutes / 60)} hours
- Recent marks: ${marksData || 'none yet'}
- Daily goal: ${S.dailyGoal} minutes

Coaching style: ${toxicMode ? 'Be brutally direct, harsh, no excuses — like a demanding coach who genuinely wants them to succeed. Be concise but impactful.' : 'Be encouraging, precise, and actionable.'}

Keep responses under 200 words. Be specific and tactical, not generic.`;

  try {
    if (S.aiProvider === 'gemini' && GEMINI_API_KEY && GEMINI_API_KEY !== 'AIza-your-key-here') {
      await callGemini(prompt, systemPrompt);
    } else if (CLAUDE_API_KEY && CLAUDE_API_KEY !== 'sk-ant-api03-your-key-here') {
      await callClaudeAI(prompt, systemPrompt);
    } else {
      // Fallback mock response if no API keys configured
      if (resp) {
        const fallbackText = toxicMode 
          ? `Listen up. You asked for it, here it is:

${prompt}

Stop making excuses. Your streak is ${S.streak} days. That's ${S.streak > 0 ? 'something' : 'pathetic'}. You want ${S.targetPct || 98}%? Then put in the work. No one is coming to save you.

Action items:
1. Study ${S.dailyGoal} minutes TODAY. Not tomorrow.
2. Review your weakest subject until you dream about it.
3. Stop reading this and go study.`
          : `Great question! Here's my advice:

${prompt}

You're doing well with a ${S.streak}-day streak. Keep building that momentum!

Key recommendations:
1. Maintain your ${S.dailyGoal}-minute daily goal
2. Focus on consistent practice rather than cramming
3. Review mistakes carefully — they are your best teachers

You've got this! 🎯`;

        let i = 0;
        const interval = setInterval(() => {
          if (i < fallbackText.length) {
            resp.textContent += fallbackText[i];
            i++;
          } else {
            clearInterval(interval);
          }
        }, 8);
      }
    }
  } catch(e) {
    if (resp) resp.textContent = 'AI error: ' + e.message;
  } finally {
    if (loader) loader.style.display = 'none';
  }
}

async function callClaudeAI(prompt, systemPrompt) {
  const resp = document.getElementById('ai-response');
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 
      'Content-Type': 'application/json',
      'x-api-key': CLAUDE_API_KEY,
      'anthropic-version': '2023-06-01'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 400,
      system: systemPrompt,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  const data = await res.json();
  const text = data.content?.map(b => b.text || '').join('') || 'No response received.';
  if (resp) {
    resp.textContent = '';
    let i = 0;
    const interval = setInterval(() => {
      if (i < text.length) {
        resp.textContent += text[i];
        i++;
      } else {
        clearInterval(interval);
      }
    }, 8);
  }
}

async function callGemini(prompt, ctx) {
  const resp = document.getElementById('ai-response');

  const url =
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`;

  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        contents: [
          {
            parts: [
              {
                text: ctx + '\n\n' + prompt
              }
            ]
          }
        ]
      })
    });

    const data = await res.json();

    console.log(data);

    const text =
      data.candidates?.[0]?.content?.parts?.[0]?.text ||
      'No response.';

    if (resp) {
      resp.textContent = '';

      let i = 0;

      const interval = setInterval(() => {
        if (i < text.length) {
          resp.textContent += text[i];
          i++;
        } else {
          clearInterval(interval);
        }
      }, 8);
    }
  } catch (err) {
    console.error('Gemini API Error:', err);

    if (resp) {
      resp.textContent = 'Error contacting Gemini API.';
    }
  }
}

// MUSIC — YouTube IFrame API
// ════════════════════════════════════════════════════════
let ytPlayer = null;
let ytReady = false;
let isPlaying = false;
let shuffleOn = false;
let musicProgressInterval = null;

function loadYTAPI() {
  if (window.YT) return;
  // Don't load YT API when running from file:// (CORS/security blocked)
  if (window.location.protocol === 'file:') {
    console.log('YT API skipped: file:// protocol not supported for iframe API');
    return;
  }
  const tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);
}

window.onYouTubeIframeAPIReady = function() {
  ytReady = true;
};

loadYTAPI();

function createYTPlayer(videoId) {
  const container = document.getElementById('yt-iframe');
  if (!container) return;
  if (window.location.protocol === 'file:') {
    notify('Music player requires http/https server. Run via localhost or deploy.');
    return;
  }

  if (ytPlayer) {
    ytPlayer.loadVideoById(videoId);
    ytPlayer.playVideo();
    return;
  }

  const div = document.createElement('div');
  div.id = 'yt-player';
  container.parentNode.insertBefore(div, container);
  container.remove();

  ytPlayer = new YT.Player('yt-player', {
    height: '1',
    width: '1',
    videoId: videoId,
    playerVars: { autoplay: 1, controls: 0 },
    events: {
      onReady: (e) => { e.target.playVideo(); updatePlayBtn(true); setVolume(80); startProgressUpdate(); },
      onStateChange: (e) => {
        if (e.data === YT.PlayerState.PLAYING) { updatePlayBtn(true); startProgressUpdate(); }
        if (e.data === YT.PlayerState.PAUSED) { updatePlayBtn(false); }
        if (e.data === YT.PlayerState.ENDED) { nextTrack(); }
      }
    }
  });
}

function playTrack(idx) {
  if (idx < 0 || idx >= S.musicQueue.length) return;
  S.currentTrackIdx = idx;
  const track = S.musicQueue[idx];
  updateNowPlaying(track);

  if (ytReady) {
    createYTPlayer(track.videoId);
  } else {
    setTimeout(() => createYTPlayer(track.videoId), 1000);
  }
  renderMusicQueue();
}

function togglePlay() {
  if (!ytPlayer || !ytPlayer.getPlayerState) return;
  const state = ytPlayer.getPlayerState();
  if (state === 1) { ytPlayer.pauseVideo(); isPlaying = false; }
  else { ytPlayer.playVideo(); isPlaying = true; }
  updatePlayBtn(isPlaying);
}

function updatePlayBtn(playing) {
  isPlaying = playing;
  const btn = document.getElementById('music-play-btn');
  if (btn) btn.innerHTML = playing ? '⏸' : '▶';
}

function prevTrack() {
  let idx = S.currentTrackIdx - 1;
  if (idx < 0) idx = S.musicQueue.length - 1;
  if (S.musicQueue.length) playTrack(idx);
}

function nextTrack() {
  if (!S.musicQueue.length) return;
  let idx;
  if (shuffleOn) { idx = Math.floor(Math.random() * S.musicQueue.length); }
  else { idx = (S.currentTrackIdx + 1) % S.musicQueue.length; }
  playTrack(idx);
}

function toggleShuffle() {
  shuffleOn = !shuffleOn;
  const btn = document.getElementById('shuffle-btn');
  if (btn) {
    btn.style.color = shuffleOn ? 'var(--accent)' : '';
    btn.style.borderColor = shuffleOn ? 'var(--accent)' : '';
  }
}

function setVolume(val) {
  if (ytPlayer && ytPlayer.setVolume) ytPlayer.setVolume(parseInt(val));
}

function seekMusic(e) {
  if (!ytPlayer || !ytPlayer.getDuration) return;
  const wrap = document.getElementById('music-progress-wrap');
  if (!wrap) return;
  const rect = wrap.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  const dur = ytPlayer.getDuration();
  ytPlayer.seekTo(dur * pct, true);
}

function startProgressUpdate() {
  clearInterval(musicProgressInterval);
  musicProgressInterval = setInterval(() => {
    if (!ytPlayer || !ytPlayer.getCurrentTime) return;
    const cur = ytPlayer.getCurrentTime();
    const dur = ytPlayer.getDuration() || 1;
    const pct = (cur / dur) * 100;
    const prog = document.getElementById('music-progress');
    if (prog) prog.style.width = pct + '%';
    const timeEl = document.getElementById('music-time');
    if (timeEl) timeEl.textContent = `${fmtMusicTime(cur)} / ${fmtMusicTime(dur)}`;
  }, 500);
}

function fmtMusicTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${String(sec).padStart(2,'0')}`;
}

function updateNowPlaying(track) {
  const title = document.getElementById('music-title');
  const artist = document.getElementById('music-artist');
  const art = document.getElementById('music-art');
  if (title) title.textContent = track.title;
  if (artist) artist.textContent = track.artist || 'YouTube';
  if (art) art.innerHTML = track.thumb
    ? `<img src="${track.thumb}" alt="${track.title}">`
    : '🎵';
}

async function searchMusic() {
  const query = document.getElementById('music-search-input')?.value?.trim();
  if (!query) return;
  const resultsEl = document.getElementById('music-results');
  if (resultsEl) resultsEl.innerHTML = '<div style="color:var(--text3);font-size:0.8rem;padding:8px">Searching...</div>';

  try {
    const res = await fetch(`https://pipedapi.kavin.rocks/search?q=${encodeURIComponent(query)}&filter=videos`);
    const data = await res.json();
    const items = (data.items || []).slice(0, 8);

    if (!items.length) {
      if (resultsEl) resultsEl.innerHTML = '<div style="color:var(--text3);font-size:0.8rem;padding:8px">No results.</div>';
      return;
    }

    if (resultsEl) resultsEl.innerHTML = items.map((item, i) => {
      const videoId = item.url?.replace('/watch?v=', '') || '';
      const thumb = item.thumbnail || '';
      const title = item.title || 'Unknown';
      const uploader = item.uploaderName || '';
      const durSecs = item.duration || 0;
      const dur = durSecs > 0 ? fmtMusicTime(durSecs) : '';
      return `<div class="music-result-row" onclick="addToQueue('${videoId}','${title.replace(/'/g,"\'")}','${uploader.replace(/'/g,"\'")}','${thumb}')">
        <div class="music-result-thumb"><img src="${thumb}" alt="" onerror="this.style.display='none'"></div>
        <div class="music-result-info">
          <div class="music-result-title">${title}</div>
          <div class="music-result-artist">${uploader}${dur ? ' · ' + dur : ''}</div>
        </div>
        <button class="btn btn-xs btn-ghost">+ Add</button>
      </div>`;
    }).join('');
  } catch(e) {
    if (resultsEl) resultsEl.innerHTML = `<div style="color:var(--text3);font-size:0.8rem;padding:8px">Search unavailable. Try adding a YouTube video ID directly.</div>
      <div style="padding:8px">
        <div style="font-size:0.72rem;color:var(--text3);margin-bottom:6px">Add by YouTube video ID or URL:</div>
        <div style="display:flex;gap:6px">
          <input type="text" id="manual-vid-id" placeholder="Video ID or URL" style="flex:1;font-size:0.78rem">
          <button class="btn btn-primary btn-xs" onclick="addManualTrack()">Add</button>
        </div>
      </div>`;
  }
}

function addManualTrack() {
  let val = document.getElementById('manual-vid-id')?.value?.trim();
  if (!val) return;
  const match = val.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);
  const videoId = match ? match[1] : val;
  addToQueue(videoId, 'Track ' + (S.musicQueue.length + 1), 'YouTube', '');
}

function addToQueue(videoId, title, artist, thumb) {
  if (!videoId) return;
  title = title.replace(/\'/g, "'");
  artist = artist.replace(/\'/g, "'");
  S.musicQueue.push({ videoId, title, artist, thumb });
  queueSave();
  renderMusicQueue();
  notify('Added to queue: ' + title.slice(0,40));
  if (S.musicQueue.length === 1) playTrack(0);
}

function clearQueue() {
  S.musicQueue = [];
  S.currentTrackIdx = 0;
  queueSave();
  renderMusicQueue();
  if (ytPlayer) ytPlayer.stopVideo?.();
}

function renderMusicQueue() {
  const el = document.getElementById('music-queue');
  if (!el) return;
  if (!S.musicQueue.length) {
    el.innerHTML = '<div style="color:var(--text3);font-size:0.8rem">Queue is empty. Search for music above.</div>';
    return;
  }
  el.innerHTML = S.musicQueue.map((t, i) => `
    <div class="music-result-row" style="background:${i === S.currentTrackIdx ? 'var(--accent-soft)' : ''}">
      <div class="music-result-thumb">
        ${t.thumb ? `<img src="${t.thumb}" alt="">` : '<div style="background:var(--surface3);width:100%;height:100%;display:grid;place-items:center;font-size:0.8rem">🎵</div>'}
      </div>
      <div class="music-result-info" onclick="playTrack(${i})" style="cursor:pointer">
        <div class="music-result-title" style="color:${i === S.currentTrackIdx ? 'var(--accent)' : ''}">${t.title}</div>
        <div class="music-result-artist">${t.artist || ''}</div>
      </div>
      <button class="btn btn-xs btn-ghost" onclick="removeFromQueue(${i})">✕</button>
    </div>`).join('');
}

function removeFromQueue(idx) {
  S.musicQueue.splice(idx, 1);
  if (S.currentTrackIdx >= S.musicQueue.length) S.currentTrackIdx = 0;
  queueSave();
  renderMusicQueue();
}

  if (supabase && currentUser) {
    try {
      await supabase.from('user_data').delete().eq('user_id', currentUser.id);
    } catch(e) {}
  }
  S = {
    streak: 0, studiedDays: [], missedDays: [], totalMinutes: 0, todayMinutes: 0,
    events: [], diary: [], marks: [], exams: [], subjects: ['Mathematics','Science','English','History','Physics'],
    dailyGoal: 120, targetPct: 98, gifts: [], aiTargets: [], aiProvider: 'claude',
    settings: { music: false, toxic: true, darkMode: true }, did: '', plan: '',
    calYear: new Date().getFullYear(), calMonth: new Date().getMonth(),
    timerSecs: 1500, timerMode: 'focus', sessions: [], distractionCount: 0,
    lastStudiedDate: null, musicQueue: [], currentTrackIdx: 0
  };
  notify('All data reset.');
  initApp();
}

// ════════════════════════════════════════════════════════
// ENTRY POINT
// ════════════════════════════════════════════════════════
async function init() {
  // ALWAYS remove loading screen first, no matter what
  const fallback = document.getElementById('js-fallback');
  if (fallback) fallback.remove();

  try {
    initParticles();

    const hasRealKeys = SUPABASE_URL && !SUPABASE_URL.includes('your-project') && SUPABASE_ANON_KEY && !SUPABASE_ANON_KEY.includes('your-anon');

    if (hasRealKeys) {
      const initialized = initSupabase();
      if (initialized && supabase) {
        try {
          const { data: { session } } = await supabase.auth.getSession();
          if (session?.user) {
            currentUser = session.user;
            await loadUserData();
            showApp();
            return;
          }
        } catch(e) {
          console.error('Session check failed:', e);
        }
      }
    } else {
      showKeyWarning();
    }

    // Show auth screen
    document.getElementById('view-auth').style.display = 'block';
    renderAuth();

  } catch (err) {
    console.error('Init error:', err);
    // Show error but don't leave user on loading screen
    const viewAuth = document.getElementById('view-auth');
    if (viewAuth) {
      viewAuth.style.display = 'block';
      viewAuth.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text)"><h2>Something went wrong</h2><p style="color:var(--text3)">' + err.message + '</p><button onclick="location.reload()" class="btn btn-primary" style="margin-top:20px">Reload</button></div>';
    }
  }
}

function showKeyWarning() {
  const warn = document.createElement('div');
  warn.id = 'key-warning';
  warn.innerHTML = `
    <div style="position:fixed;top:60px;left:0;right:0;z-index:150;background:var(--red);color:#fff;padding:10px 16px;text-align:center;font-size:0.8rem;font-family:'Anthropic Serif',Georgia,serif;">
      ⚠️ Supabase keys not configured. Open this file in a text editor and replace the placeholder keys at the top.
      <button onclick="document.getElementById('key-warning').remove()" style="margin-left:10px;background:rgba(255,255,255,0.2);border:none;color:#fff;padding:3px 10px;border-radius:20px;cursor:pointer;font-family:inherit;font-size:0.75rem;">Dismiss</button>
    </div>`;
  document.body.appendChild(warn);
}

// Defer init until DOM is fully ready + small delay for CDN scripts
document.addEventListener('DOMContentLoaded', function() {
  console.log('DOM ready, starting init...');
  // Give CDN scripts a moment to load
  setTimeout(function() {
    try {
      init();
      console.log('Init completed');
    } catch(e) {
      console.error('Init crashed:', e);
      document.body.innerHTML = '<div style="padding:40px;color:#fff;font-family:sans-serif;"><h2>Error</h2><pre style="background:#222;padding:20px;border-radius:8px;">' + e.toString() + '<br>' + (e.stack || '') + '</pre></div>';
    }
  }, 300);
});
function toggleMobileNav() {
  const btn = document.getElementById('burger-btn');
  const overlay = document.getElementById('mobile-nav-overlay');
  btn.classList.toggle('open');
  overlay.classList.toggle('open');
  document.body.style.overflow = overlay.classList.contains('open') ? 'hidden' : '';
}

function mobileNavPage(page) {
  toggleMobileNav();
  showPage(page);
}

// Close mobile nav on resize to desktop
window.addEventListener('resize', () => {
  if (window.innerWidth > 640) {
    const btn = document.getElementById('burger-btn');
    const overlay = document.getElementById('mobile-nav-overlay');
    if (btn) btn.classList.remove('open');
    if (overlay) overlay.classList.remove('open');
    document.body.style.overflow = '';
  }
});
</script>

name: Build Kosmosic APK

on:
  push:
    branches: ["main"]

  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 📦 Install dependencies
        run: |
          npm install
          npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6

      - name: 🔍 Verify Capacitor
        run: npx cap --version

      - name: 🏗️ Build Vite app
        run: npm run build

      - name: 🔧 Create Capacitor config if missing
        run: |
          if [ ! -f "capacitor.config.ts" ] && [ ! -f "capacitor.config.json" ]; then
            echo '{
              "appId": "com.kosmosic.app",
              "appName": "Kosmosic",
              "webDir": "dist",
              "bundledWebRuntime": false
            }' > capacitor.config.json
          fi

      - name: 🤖 Add Android platform if missing
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: 🔄 Sync Capacitor
        run: npx cap sync android

      - name: 🏗️ Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📂 Verify APK output
        run: |
          ls android/app/build/outputs/apk/debug

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kosmosic-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

name: Kosmosic Release Pipeline

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📦 Install dependencies
        run: npm install

      - name: 🏗️ Build Kosmosic
        run: |
          echo "Building Kosmosic release..."
          npm run build

      - name: 📂 Verify EXE output
        run: dir dist

      - name: 🏷️ Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/**/*.exe
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: 🌌 Release Published
        run: echo "Kosmosic release deployed ✔️"

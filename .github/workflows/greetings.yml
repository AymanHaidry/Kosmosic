name: Greetings

on: [pull_request_target, issues]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - uses: actions/first-interaction@v1
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        issue-message: |
          # 👋 Welcome to Time Echo Platformer!
          
          Thanks for opening your first issue! We're excited to have you here.
        
          ✅ **Be specific** — steps to reproduce, screenshots, browser/OS info help us a ton  
          
          **Need help?**
        
          - 🐛 **Found a bug?** Great! Include console errors (F12 → Console tab)
          - 💡 **Feature request?** Tell us your use case — we love hearing ideas
          - 🔧 **Tech issue?** Let us know your setup (browser, OS, other, info)
          
          See you in the Study City! ⏳✨
        pr-message: |
          # 👋 Welcome, contributor!
          
          Thanks for your first pull request! We appreciate the effort.
          
          **Before we merge, remember:**
          
          📖 **Our License** — Kosmsosic is [**fully closed**](https://github.com/AymanHaidry/Kosmosic/LICENSE.md)  
          - ✅ Mod mercilessly (for personal use)  
          - ❌ Can't distribute modified versions without permission  
          - 🤝 We're open to discussing permission requests  
          
          **PR Guidelines:**
          - 🎯 **Focus**: One feature/fix per PR (smaller = faster review)
          - 📝 **Description**: Explain what & why, not just how
          - 🧪 **Testing**: Did you test locally? Works on mobile?
          - 🎨 **Code style**: Keep it readable, match existing patterns
          - 💬 **Discuss first**: For major changes, open an issue/discussion first
          
          **What we're looking for:**
          - Bug fixes with test cases
          - Performance improvements
          - Accessibility enhancements
          - Documentation updates
          
          **What we can't accept:**
          - License violations or auth bypasses
          - Changes that break offline play
          - Circumventing the closed distribution model
          
          Questions? Drop a comment below, we're friendly! 🎮✨


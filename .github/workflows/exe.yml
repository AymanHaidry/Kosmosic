name: Build Kosmosic EXE

on:
  push:
    branches: ["main"]

jobs:
  vibe:
    runs-on: ubuntu-latest
    steps:
      - run: echo "🌌 Kosmosic systems aligned ✔️"

  focus-check:
    runs-on: ubuntu-latest
    steps:
      - run: echo "📚 Study engine reachable ✔️"

  build-exe:
    runs-on: windows-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📦 Install dependencies
        run: |
          echo "Installing Kosmosic dependencies..."
          npm install

      - name: 🏗️ Build Kosmosic
        run: |
          echo "Building Kosmosic desktop app..."
          npm run build
          echo "Kosmosic build complete ✔️"

      - name: 📂 Verify dist folder
        run: |
          echo "Checking generated files..."
          dir dist

      - name: 📤 Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kosmosic-exe
          path: |
            dist/*.exe
            dist/**/*.exe
